<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plaza Vea - Portal del Empleado (POS)</title>
    
    <!-- ✅ RUTA CORRECTA AL CSS -->
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- ✅ RUTA CORRECTA AL JS -->
    <script src="js/auth.js" defer></script>
</head>
<body>
    <div class="login-container">
        <div class="brand-section">
            <div class="brand-logo">plaza<span>Vea</span></div>
            <div class="brand-subtitle">Sistema de Punto de Venta</div>
        </div>

        <div class="form-section">
            <div class="welcome-text">
                <h2>Ingreso al Sistema</h2>
                <p>Por favor, introduce tus credenciales para abrir caja.</p>
            </div>

            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="usuario">Usuario Cajero</label>
                    <input type="text" id="usuario" name="usuario" class="form-control" placeholder="Ingresar Usuario" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="password-container">
                        <input type="password" id="password" name="password" class="form-control" placeholder="Contraseña" required autocomplete="current-password">
                        <button type="button" id="togglePasswordBtn" class="toggle-password">Mostrar</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="turno">Turno de Trabajo</label>
                    <select id="turno" name="turno" class="form-control" required>
                        <option value="" disabled selected>Selecciona tu turno...</option>
                        <option value="1">Mañana (07:00 AM - 03:00 PM)</option>
                        <option value="2">Tarde (03:00 PM - 11:00 PM)</option>
                    </select>
                </div>

                <button type="submit" class="btn-login">Iniciar Sesión</button>
            </form>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const passwordInput = document.getElementById('password');
            const togglePasswordBtn = document.getElementById('togglePasswordBtn');

            togglePasswordBtn.addEventListener('click', () => {
                const isPassword = passwordInput.getAttribute('type') === 'password';
                passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
                togglePasswordBtn.textContent = isPassword ? 'Ocultar' : 'Mostrar';
            });
        });
    </script>
</body>
</html>
